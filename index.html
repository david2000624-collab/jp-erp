<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12645d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="代購ERP" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>代購 ERP 後台</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="brand-row">
          <div class="app-icon">JP</div>
          <div>
            <p class="kicker" data-i18n="appSubtitle">日本代購後台</p>
            <h1 data-i18n="loginTitle">代購 ERP</h1>
          </div>
        </div>
        <label class="field"><span data-i18n="language">語言</span><select id="loginLang"><option value="zh">中文</option><option value="ja">日本語</option></select></label>
        <label class="field"><span data-i18n="account">帳號</span><input id="username" autocomplete="username" inputmode="text" placeholder="kosei / cho" /></label>
        <label class="field"><span data-i18n="password">密碼</span><input id="password" autocomplete="current-password" inputmode="numeric" type="password" placeholder="0000" /></label>
        <p id="loginError" class="form-error" aria-live="polite"></p>
        <button id="loginBtn" class="primary-button" type="button" data-i18n="login">登入</button>
      </div>
    </section>

    <section id="appShell" class="app-shell hidden">
      <header class="mobile-header">
        <div><p class="kicker" data-i18n="todayWork">今日工作</p><h1 data-i18n="dashboard">總覽</h1></div>
        <div class="header-actions">
          <div class="currency-toggle" aria-label="Currency">
            <button type="button" data-currency-toggle="JPY" data-i18n="jpyCurrency">日幣</button>
            <button type="button" data-currency-toggle="TWD" data-i18n="twdCurrency">台幣</button>
          </div>
          <select id="appLang" aria-label="Language"><option value="zh">中文</option><option value="ja">日本語</option></select>
          <button id="logoutBtn" class="ghost-button" type="button" data-i18n="logout">登出</button>
        </div>
      </header>

      <main class="content">
        <section class="summary-grid" aria-label="ERP summary">
          <article class="summary-card"><span data-i18n="pendingOrders">待處理訂單</span><strong id="pendingOrders">0</strong></article>
          <article class="summary-card"><span data-i18n="purchaseItems">進貨項目</span><strong id="purchaseCount">0</strong></article>
          <article class="summary-card"><span data-i18n="inventory">庫存</span><strong id="inventoryUnits">0</strong></article>
          <article class="summary-card"><span data-i18n="unpaidCustomers">未付款客戶</span><strong id="unpaidCustomers">0</strong></article>
          <article class="summary-card"><span data-i18n="advanceTotal">代墊總額</span><strong id="advanceTotal">¥0</strong></article>
        </section>

        <section class="tabs" aria-label="ERP modules">
          <button class="tab active" data-view="orders" type="button" data-i18n="orders">訂單</button>
          <button class="tab" data-view="products" type="button" data-i18n="products">商品</button>
          <button class="tab" data-view="purchaseItems" type="button" data-i18n="purchaseItems">進貨</button>
          <button class="tab" data-view="inventory" type="button" data-i18n="inventory">庫存</button>
          <button class="tab" data-view="packages" type="button" data-i18n="packages">包裹</button>
          <button class="tab" data-view="shipping" type="button" data-i18n="shipping">出貨</button>
          <button class="tab" data-view="customers" type="button" data-i18n="customers">客戶</button>
          <button class="tab" data-view="accounting" type="button" data-i18n="accounting">對帳</button>
          <button class="tab" data-view="settings" type="button" data-i18n="settings">設定</button>
        </section>

        <section id="orders" class="view active">
          <div class="section-title"><h2 data-i18n="orders">訂單</h2><button class="small-button" data-open-form="orderForm" type="button" data-i18n="addOrder">新增訂單</button></div>
          <form id="orderForm" class="quick-form hidden" data-collection="orders">
            <input data-field="customer" data-i18n-placeholder="customerName" placeholder="客戶姓名" />
            <select id="orderProduct" data-field="productId"></select>
            <input id="orderQuantity" data-field="quantity" inputmode="numeric" data-i18n-placeholder="quantity" placeholder="數量" />
            <div class="money-field"><input id="orderUnitPrice" data-field="unitPrice" inputmode="decimal" data-i18n-placeholder="unitPrice" placeholder="單價" /><select data-currency-for="unitPrice"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <select data-field="status"><option value="報價中">報價中</option><option value="待付款">待付款</option><option value="已採購">已採購</option><option value="已入庫">已入庫</option></select>
            <div class="form-total"><span data-i18n="orderTotal">訂單總額</span><strong id="orderTotalPreview">¥0</strong></div>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="orderList" class="list"></div>
        </section>

        <section id="products" class="view">
          <div class="section-title"><h2 data-i18n="products">商品</h2><button class="small-button" data-open-form="productForm" type="button" data-i18n="addProduct">新增商品</button></div>
          <form id="productForm" class="quick-form hidden" data-collection="products">
            <input data-field="name" data-i18n-placeholder="itemName" placeholder="商品名稱" />
            <input data-field="customer" data-i18n-placeholder="customerName" placeholder="客戶姓名" />
            <div class="money-field"><input data-field="price" inputmode="decimal" data-i18n-placeholder="price" placeholder="商品金額" /><select data-currency-for="price"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <div class="money-field"><input data-field="shippingCost" inputmode="decimal" data-i18n-placeholder="shippingCost" placeholder="運費" /><select data-currency-for="shippingCost"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <div class="money-field"><input data-field="salePrice" inputmode="decimal" data-i18n-placeholder="salePrice" placeholder="售價" /><select data-currency-for="salePrice"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <input data-field="stock" inputmode="numeric" data-i18n-placeholder="stock" placeholder="庫存" />
            <label class="file-field"><span data-i18n="productImage">商品圖片</span><input id="productImageFile" type="file" accept="image/*" /></label>
            <input type="hidden" data-field="image" />
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="productList" class="list"></div>
        </section>

        <section id="purchaseItems" class="view">
          <div class="section-title"><h2 data-i18n="purchaseItems">進貨項目</h2><button class="small-button" data-open-form="purchaseForm" type="button" data-i18n="addPurchase">新增進貨</button></div>
          <form id="purchaseForm" class="quick-form hidden" data-collection="purchaseItems">
            <select id="purchaseProduct" data-field="productId"></select>
            <input id="purchaseItemName" data-field="item" data-i18n-placeholder="itemName" placeholder="商品名稱" />
            <input data-field="supplier" data-i18n-placeholder="supplier" placeholder="供應商 / 店家" />
            <input id="purchaseQuantity" data-field="quantity" inputmode="numeric" data-i18n-placeholder="quantity" placeholder="數量" />
            <div class="money-field"><input id="purchaseUnitCost" data-field="unitCost" inputmode="decimal" data-i18n-placeholder="unitCost" placeholder="進貨單價" /><select data-currency-for="unitCost"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <div class="money-field"><input id="purchaseShippingCost" data-field="shippingCost" inputmode="decimal" data-i18n-placeholder="shippingCost" placeholder="運費" /><select data-currency-for="shippingCost"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <div class="money-field"><input id="purchaseTransportCost" data-field="transportCost" inputmode="decimal" data-i18n-placeholder="transportCost" placeholder="交通費" /><select data-currency-for="transportCost"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <select data-field="status"><option value="待採購">待採購</option><option value="已下單">已下單</option><option value="已到貨">已到貨</option><option value="已入庫">已入庫</option></select>
            <div class="form-total"><span data-i18n="purchaseTotal">進貨總成本</span><strong id="purchaseTotalPreview">¥0</strong></div>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="purchaseList" class="list"></div>
        </section>

        <section id="inventory" class="view">
          <div class="section-title"><h2 data-i18n="inventory">庫存</h2><button class="small-button" data-open-form="inventoryForm" type="button" data-i18n="addInventoryLog">調整庫存</button></div>
          <form id="inventoryForm" class="quick-form hidden">
            <select id="inventoryProduct" data-field="productId"></select>
            <select id="inventoryType" data-field="type">
              <option value="in" data-i18n="stockIn">入庫存</option>
              <option value="out" data-i18n="stockOut">出庫</option>
              <option value="set" data-i18n="stockSet">盤點設定</option>
            </select>
            <input id="inventoryQuantity" data-field="quantity" inputmode="numeric" data-i18n-placeholder="quantity" placeholder="數量" />
            <input id="inventoryNote" data-field="note" data-i18n-placeholder="inventoryNote" placeholder="備註" />
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div class="advance-box inventory-stats">
            <div><span data-i18n="totalUnits">總庫存數</span><strong id="inventoryTotalUnits">0</strong></div>
            <div><span data-i18n="lowStock">低庫存</span><strong id="inventoryLowStock">0</strong></div>
            <div><span data-i18n="inventoryValue">庫存價值</span><strong id="inventoryValue">¥0</strong></div>
            <div><span data-i18n="inventoryHistory">庫存紀錄</span><strong id="inventoryLogCount">0</strong></div>
          </div>
          <div id="inventoryList" class="list"></div>
        </section>

        <section id="packages" class="view">
          <div class="section-title"><h2 data-i18n="packages">包裹</h2><button class="small-button" data-open-form="packageForm" type="button" data-i18n="addPackage">新增包裹</button></div>
          <form id="packageForm" class="quick-form hidden" data-collection="packages">
            <input data-field="no" placeholder="JP-WH-001" />
            <input data-field="customer" data-i18n-placeholder="customerName" placeholder="客戶姓名" />
            <select data-field="status"><option value="日本倉入庫">日本倉入庫</option><option value="等待合箱">等待合箱</option><option value="可出貨">可出貨</option></select>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="packageList" class="list"></div>
        </section>

        <section id="shipping" class="view">
          <div class="section-title"><h2 data-i18n="shipping">出貨</h2><button class="small-button" data-open-form="shippingForm" type="button" data-i18n="addShipment">新增出貨</button></div>
          <form id="shippingForm" class="quick-form hidden" data-collection="shipping">
            <input data-field="customer" data-i18n-placeholder="customerName" placeholder="客戶姓名" />
            <select data-field="method"><option value="空運">空運</option><option value="海運">海運</option><option value="EMS">EMS</option></select>
            <select data-field="status"><option value="待出貨">待出貨</option><option value="已出貨">已出貨</option></select>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="shippingList" class="list"></div>
        </section>

        <section id="customers" class="view">
          <div class="section-title"><h2 data-i18n="customers">客戶</h2><button class="small-button" data-open-form="customerForm" type="button" data-i18n="addCustomer">新增客戶</button></div>
          <form id="customerForm" class="quick-form hidden" data-collection="customers">
            <input data-field="name" data-i18n-placeholder="customerName" placeholder="客戶姓名" />
            <input data-field="contact" placeholder="LINE / 電話" />
            <select data-field="paymentStatus"><option value="未付款">未付款</option><option value="部分付款">部分付款</option><option value="已付款">已付款</option></select>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div id="customerList" class="list"></div>
        </section>

        <section id="accounting" class="view">
          <div class="section-title">
            <h2 data-i18n="accounting">對帳</h2>
            <div class="title-actions">
              <button class="small-button" data-open-form="accountingForm" type="button" data-i18n="addPayment">新增付款</button>
              <button class="small-button" data-open-shipping-advance type="button" data-i18n="addShippingAdvance">新增運費代墊費用</button>
            </div>
          </div>
          <form id="accountingForm" class="quick-form hidden" data-collection="payments">
            <select id="paymentProduct" data-field="productId"></select>
            <select id="paymentType" data-field="type"><option value="product" data-i18n="productAdvance">商品代墊</option><option value="shipping" data-i18n="shippingAdvance">運費代墊</option></select>
            <select data-field="payer"><option value="kosei">kosei</option><option value="cho">cho</option></select>
            <input id="paymentNote" data-field="note" data-i18n-placeholder="paymentNote" placeholder="備註" />
            <div class="money-field"><input data-field="amount" inputmode="decimal" data-i18n-placeholder="paidAmount" placeholder="付款金額" /><select data-currency-for="amount"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></div>
            <button class="primary-button" type="submit" data-i18n="save">儲存</button>
          </form>
          <div class="advance-box">
            <div><span data-i18n="koseiAdvance">kosei 代墊</span><strong id="koseiAdvance">¥0</strong></div>
            <div><span data-i18n="choAdvance">cho 代墊</span><strong id="choAdvance">¥0</strong></div>
            <div><span data-i18n="shippingAdvance">運費代墊</span><strong id="shippingAdvance">¥0</strong></div>
            <div><span data-i18n="advanceTwd">目前幣別</span><strong id="advanceTwd">¥0</strong></div>
            <div><span data-i18n="backupStatus">自動備份</span><strong id="backupStatus" data-i18n="dailyBackup">每天</strong></div>
          </div>
          <div id="paymentList" class="list"></div>
        </section>

        <section id="settings" class="view">
          <div class="section-title"><h2 data-i18n="settings">設定</h2></div>
          <form id="settingsForm" class="quick-form settings-form">
            <label class="inline-field"><span data-i18n="exchangeRate">日幣換台幣匯率</span><input id="exchangeRate" inputmode="decimal" placeholder="0.22" /></label>
            <label class="inline-field"><span data-i18n="displayCurrency">顯示幣別</span><select id="displayCurrency"><option value="JPY" data-i18n="jpyCurrency">日幣</option><option value="TWD" data-i18n="twdCurrency">台幣</option></select></label>
            <button class="primary-button" type="submit" data-i18n="saveSettings">儲存設定</button>
          </form>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Quick modules">
        <button class="bottom-link active" data-view="orders" type="button" data-i18n="orders">訂單</button>
        <button class="bottom-link" data-view="products" type="button" data-i18n="products">商品</button>
        <button class="bottom-link" data-view="purchaseItems" type="button" data-i18n="purchaseItems">進貨</button>
        <button class="bottom-link" data-view="inventory" type="button" data-i18n="inventory">庫存</button>
        <button class="bottom-link" data-view="settings" type="button" data-i18n="settings">設定</button>
      </nav>
    </section>
    <script src="script.js"></script>
  </body>
</html>
